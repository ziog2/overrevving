name: Aggiorna classifiche Motorsport

on:
  schedule:
    - cron: '0 18 * * 6'
    - cron: '0 18 * * 0'
  workflow_dispatch: {}

jobs:
  update-standings:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica e aggiorna tutte le classifiche
        env:
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request
          from datetime import datetime, timezone, timedelta

          api_key = os.environ['JSONBIN_API_KEY']
          bin_id  = os.environ['JSONBIN_BIN_ID']
          bin_url = f"https://api.jsonbin.io/v3/b/{bin_id}"

          HEADERS_BASE = {
              "Content-Type": "application/json",
              "User-Agent": "Mozilla/5.0 (compatible; GitHubActions-MotorsportUpdater/1.0)"
          }

          def http_get(url, extra_headers=None):
              headers = dict(HEADERS_BASE)
              if extra_headers:
                  headers.update(extra_headers)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          # ---- 1. Leggi il bin attuale prima per preservare la cronologia (history) ----
          try:
              current = http_get(bin_url + "/latest", {"X-Access-Key": api_key})['record']
          except Exception as e:
              print(f"Errore caricamento bin per history: {e}")
              current = {}

          # ---- 1b. MotoGP / Moto2 / Moto3 via API pulselive (Dorna) with full per-session history ----
          SEASON_2026 = "e88b4e43-2209-47aa-8e83-0e0b1cedde6e"
          CATEGORY_UUIDS = {
              "motogp": "e8c110ad-64aa-4e8e-8a86-f2f152f6a942",
              "moto2":  "549640b8-fd9c-4245-acfd-60e4bc38b25c",
              "moto3":  "954f7e65-2ef2-4423-b949-4961cc603e45",
          }
          GP_SHORT_NAMES = ["THA", "BRA", "USA", "SPA", "FRA", "CAT", "ITA", "HUN", "CZE", "NED", "GER"]

          results = {}

          for cat_id, cat_uuid in CATEGORY_UUIDS.items():
              try:
                  events_url = f"https://api.motogp.pulselive.com/motogp/v1/results/events?seasonUuid={SEASON_2026}&categoryUuid={cat_uuid}"
                  events = http_get(events_url)
                  gp_events_map = {ev['short_name']: ev['id'] for ev in events if isinstance(ev, dict) and ev.get('short_name') in GP_SHORT_NAMES}

                  standings_url = f"https://api.motogp.pulselive.com/motogp/v1/results/standings?seasonUuid={SEASON_2026}&categoryUuid={cat_uuid}"
                  standings = http_get(standings_url).get('classification', [])

                  all_riders = []
                  for c in standings:
                      if not c.get('rider') or not c['rider'].get('full_name'): continue
                      name = c['rider']['full_name'].strip()
                      if "Vinales" in name or "Vi.ales" in name: name = "Maverick Viñales"
                      if "Munoz" in name or "Mu.oz" in name: name = "Daniel Muñoz"
                      if "Oncu" in name or ".ncu" in name: name = "Deniz Öncü"
                      if name not in all_riders: all_riders.append(name)

                  rider_matrix = {r: {gp: {'spr': 0, 'rac': 0} for gp in GP_SHORT_NAMES} for r in all_riders}

                  for short_name in GP_SHORT_NAMES:
                      if short_name not in gp_events_map: continue
                      ev_id = gp_events_map[short_name]
                      sessions_url = f"https://api.motogp.pulselive.com/motogp/v1/results/sessions?eventUuid={ev_id}&categoryUuid={cat_uuid}"
                      try:
                          sessions = http_get(sessions_url)
                      except Exception: continue

                      spr_session = next((s for s in sessions if isinstance(s, dict) and s.get('type') == 'SPR'), None)
                      rac_session = next((s for s in sessions if isinstance(s, dict) and s.get('type') == 'RAC'), None)

                      if spr_session:
                          try:
                              res = http_get(f"https://api.motogp.pulselive.com/motogp/v1/results/session/{spr_session['id']}/classification?categoryUuid={cat_uuid}")
                              for c in res.get('classification', []):
                                  if not c.get('rider') or not c['rider'].get('full_name'): continue
                                  name = c['rider']['full_name'].strip()
                                  if "Vinales" in name or "Vi.ales" in name: name = "Maverick Viñales"
                                  if "Munoz" in name or "Mu.oz" in name: name = "Daniel Muñoz"
                                  if "Oncu" in name or ".ncu" in name: name = "Deniz Öncü"
                                  pts = int(c.get('points', 0)) if c.get('points') is not None else 0
                                  if name not in rider_matrix: rider_matrix[name] = {g: {'spr': 0, 'rac': 0} for g in GP_SHORT_NAMES}
                                  rider_matrix[name][short_name]['spr'] = pts
                          except Exception: pass

                      if rac_session:
                          try:
                              res = http_get(f"https://api.motogp.pulselive.com/motogp/v1/results/session/{rac_session['id']}/classification?categoryUuid={cat_uuid}")
                              for c in res.get('classification', []):
                                  if not c.get('rider') or not c['rider'].get('full_name'): continue
                                  name = c['rider']['full_name'].strip()
                                  if "Vinales" in name or "Vi.ales" in name: name = "Maverick Viñales"
                                  if "Munoz" in name or "Mu.oz" in name: name = "Daniel Muñoz"
                                  if "Oncu" in name or ".ncu" in name: name = "Deniz Öncü"
                                  pts = int(c.get('points', 0)) if c.get('points') is not None else 0
                                  if name not in rider_matrix: rider_matrix[name] = {g: {'spr': 0, 'rac': 0} for g in GP_SHORT_NAMES}
                                  rider_matrix[name][short_name]['rac'] = pts
                          except Exception: pass

                  # Marc Marquez explicit user override for MotoGP
                  if cat_id == "motogp" and "Marc Marquez" in rider_matrix:
                      m_spr = [9, 12, 0, 12, 0, 0, 5, 12, 7, 4, 12]
                      m_rac = [0, 13, 11, 0, 0, 0, 9, 25, 25, 9, 25]
                      for idx, gp in enumerate(GP_SHORT_NAMES):
                          rider_matrix["Marc Marquez"][gp]['spr'] = m_spr[idx]
                          rider_matrix["Marc Marquez"][gp]['rac'] = m_rac[idx]

                  clean_riders = []
                  for name, gp_dict in rider_matrix.items():
                      spr_hist = [gp_dict[gp]['spr'] for gp in GP_SHORT_NAMES]
                      rac_hist = [gp_dict[gp]['rac'] for gp in GP_SHORT_NAMES]
                      tot_hist = [s + r for s, r in zip(spr_hist, rac_hist)]
                      spr_pts = sum(spr_hist)
                      rac_pts = sum(rac_hist)
                      tot_pts = sum(tot_hist)
                      clean_riders.append({
                          "name": name,
                          "pts": tot_pts,
                          "history": tot_hist,
                          "sprint_pts": spr_pts,
                          "sprint_history": spr_hist,
                          "long_pts": rac_pts,
                          "long_history": rac_hist
                      })

                  clean_riders.sort(key=lambda r: r['pts'], reverse=True)
                  results[cat_id] = clean_riders
                  print(f"{cat_id} (Piloti + Sprint/Long history): {len(clean_riders)} importati")
              except Exception as e:
                  print(f"Errore {cat_id}: {e}")

          # ---- 2. MXGP via mxgpresults.com ----
          try:
              import re
              mxgp_url = "https://mxgpresults.com/mxgp/standings"
              req_mxgp = urllib.request.Request(mxgp_url, headers={
                  "User-Agent": "Mozilla/5.0 (compatible; GitHubActions-MotorsportUpdater/1.0)"
              })
              with urllib.request.urlopen(req_mxgp) as resp:
                  html = resp.read().decode('utf-8')

              rows = re.findall(r'<tr[^>]*>\s*<td[^>]*>\d+\s*</td>\s*<td[^>]*>#\d+\s*</td>\s*<td[^>]*>(.*?)</td>.*?<td[^>]*>(\d+)\s*</td>\s*</tr>', html, re.DOTALL)
              mxgp_riders = []
              for name_cell, pts in rows:
                  name = re.sub(r'<[^>]+>', '', name_cell).strip()
                  if name: mxgp_riders.append({"name": name, "pts": int(pts)})

              if mxgp_riders:
                  results['mxgp'] = mxgp_riders
                  print(f"mxgp: {len(mxgp_riders)} piloti importati")
          except Exception as e:
              print(f"Errore MXGP: {e}")

          # ---- 3. F1 via Jolpica API ----
          try:
              f1_data = http_get("https://api.jolpi.ca/ergast/f1/2026/driverstandings.json")
              lists = f1_data.get('MRData', {}).get('StandingsTable', {}).get('StandingsLists', [])
              if lists:
                  standings = lists[0]['DriverStandings']
                  f1_riders = [
                      {"name": d['Driver']['givenName'] + ' ' + d['Driver']['familyName'],
                       "pts": float(d['points'])}
                      for d in standings
                  ]
                  results['f1'] = f1_riders
                  print(f"f1: {len(f1_riders)} piloti importati")
          except Exception as e:
              print(f"Errore F1: {e}")

          # ---- 3b. MX2 via mxgpresults.com ----
          try:
              import re
              mx2_url = "https://mxgpresults.com/mx2/standings"
              req_mx2 = urllib.request.Request(mx2_url, headers={
                  "User-Agent": "Mozilla/5.0 (compatible; GitHubActions-MotorsportUpdater/1.0)"
              })
              with urllib.request.urlopen(req_mx2) as resp:
                  html2 = resp.read().decode('utf-8')
              rows2 = re.findall(r'<tr[^>]*>\s*<td[^>]*>\d+\s*</td>\s*<td[^>]*>#\d+\s*</td>\s*<td[^>]*>(.*?)</td>.*?<td[^>]*>(\d+)\s*</td>\s*</tr>', html2, re.DOTALL)
              mx2_riders = []
              for name_cell, pts in rows2:
                  name = re.sub(r'<[^>]+>', '', name_cell).strip()
                  if name: mx2_riders.append({"name": name, "pts": int(pts)})
              if mx2_riders:
                  results['mx2'] = mx2_riders
                  print(f"mx2: {len(mx2_riders)} riders imported")
          except Exception as e:
              print(f"Error MX2: {e}")

          if not results:
              print("Nessun dato recuperato, esco senza aggiornare.")
              exit(0)

          # ---- 4. Keep clean keys and update ----
          keys_to_keep = ["motogp", "motogp_constructors", "motogp_teams", "moto2", "moto2_constructors", "moto2_teams", "moto3", "moto3_constructors", "moto3_teams", "sbk", "sbk_constructors", "sbk_teams", "mxgp", "mx2", "f1", "_updated"]
          clean_current = {k: current[k] for k in keys_to_keep if k in current}
          clean_current.update(results)

          it_time = datetime.now(timezone.utc) + timedelta(hours=2)
          clean_current['_updated'] = it_time.strftime('%d/%m/%Y, %H:%M:%S') + ' · Auto (Domenica)'

          body = json.dumps(clean_current, separators=(',', ':')).encode('utf-8')
          req2 = urllib.request.Request(
              bin_url, data=body, method='PUT',
              headers={**HEADERS_BASE, "X-Access-Key": api_key}
          )
          with urllib.request.urlopen(req2) as resp2:
              print("Salvato su JSONBin:", resp2.status)
          PYEOF