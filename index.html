  .menu-btn:hover { background: #3a3a42; }
  .menu-btn span {
    display: block; width: 20px; height: 2px;
    background: #ccc; border-radius: 2px;
  }
  .sidebar {
    position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
    background: #2a2a30; border-left: 1px solid #3a3a42;
    z-index: 300; transition: right 0.3s ease;
    display: flex; flex-direction: column;
    padding: 20px 16px; box-shadow: -4px 0 20px rgba(0,0,0,0.4);

  .sidebar-close:hover { color: #ddd; }
  .champ-toggle {

    cursor: pointer; margin-bottom: 6px;
    transition: background 0.15s; user-select: none;
  }
  .champ-toggle:hover { background: #333340; }
  .champ-toggle input { display: none; }
  .champ-dot {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }
  .champ-label { font-size: 14px; color: #ddd; flex: 1; }
  .champ-check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid #555; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.15s;
  }
  .champ-toggle.active .champ-check {
    background: #3d6bbd; border-color: #3d6bbd; color: #fff;
  }
  .champ-check::after { content: ''; display: none; }
  .champ-toggle.active .champ-check::after {

const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

const CATEGORIES = [
  { id: 'motogp', label: 'MotoGP', cls: 'motogp', url: 'https://www.motogp.com/en/world-standing/2026/motogp/championship-standings' },
  { id: 'moto2',  label: 'Moto2',  cls: 'moto2',  url: 'https://www.motogp.com/en/world-standing/2026/moto2/championship-standings' },

async function loadAndRender() {
  try {
    const res = await fetch(BIN_URL, {
      headers: { 'X-Access-Key': API_KEY }
    });
    if (!res.ok) throw new Error('Errore caricamento dati');
    const json = await res.json();
    const all = json.record;
    renderAll(all);
  } catch(e) {
    document.getElementById('standings-grid').innerHTML =
      '<div class="loading" style="color:#ca5f5f">⚠ Error loading standings</div>';
    document.getElementById('last-updated').textContent = '';
  }
}

function renderAll(all) {
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const riders = all[cat.id] || [];
    const col = document.createElement('div');
    col.className = 'column ' + cat.cls;
    let rows = '';
    if (riders.length === 0) {
      rows = '<tr><td colspan="3" style="text-align:center;color:#555;padding:20px;font-size:12px;">No data available</td></tr>';
    } else {
      const leader = riders[0].pts;
      riders.forEach((r, i) => {
        const pc = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
        const gap = i === 0 ? '' : `<span style="font-weight:normal;color:#666;font-size:11px;margin-left:4px">-${leader - r.pts}</span>`;
        const shortName = formatName(r.name);
        const favKey = cat.id + ':' + r.name;
        const isFav = favorites.has(favKey);
        rows += `<tr class="${pc}${isFav ? ' favorite' : ''}" data-fav="${favKey}">
          <td>${i+1}</td>
          <td><div class="driver-name" title="${r.name}">${shortName}</div></td>
          <td>${r.pts}${gap}</td>
          <td style="width:20px;padding:4px 6px"><button class="fav-btn${isFav ? ' active' : ''}" onclick="toggleFav('${favKey}')" title="Favourite rider">★</button></td>
        </tr>`;
      });
    }
    col.innerHTML =
      `<div class="col-header">
        <a href="${cat.url}" target="_blank" style="color:inherit;text-decoration:none;">${cat.label} ↗</a>
        <div class="next-round" id="countdown-${cat.id}">🏁 → Loading...</div>
      </div>` +
      `<table><thead><tr><th>#</th><th>Rider</th><th>Pts</th><th style="width:20px"></th></tr></thead><tbody>${rows}</tbody></table>`;
    grid.appendChild(col);
  });
  const ts = all['_updated'];
  document.getElementById('last-updated').textContent = ts ? 'Last updated: ' + ts : '';
  // Avvia countdown dopo che il DOM è pronto
  loadCountdown();
  applyVisibility();
}

// ---- Sidebar championship selector ----
const CHAMP_COLORS = {
  motogp: '#c0392b', moto2: '#e67e22', moto3: '#27ae60',
  sbk: '#2980b9', mxgp: '#ff6b00', mx2: '#f0a500', f1: '#e10600'
};

// Load saved preferences or default all visible
let visibleChamps = new Set(
  JSON.parse(localStorage.getItem('overrevving_champs') ||
  JSON.stringify(CATEGORIES.map(c => c.id)))
);

function saveChampPrefs() {
  localStorage.setItem('overrevving_champs', JSON.stringify([...visibleChamps]));
}

function buildSidebarList() {
  const list = document.getElementById('champ-list');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const active = visibleChamps.has(cat.id);
    const div = document.createElement('div');
    div.className = 'champ-toggle' + (active ? ' active' : '');
    div.dataset.id = cat.id;
    div.innerHTML = `
      <div class="champ-dot" style="background:${CHAMP_COLORS[cat.id]}"></div>
      <span class="champ-label">${cat.label}</span>
      <div class="champ-check"></div>`;
    div.onclick = () => toggleChamp(cat.id, div);
    list.appendChild(div);
  });
}

function toggleChamp(id, el) {
  if (visibleChamps.has(id)) {
    visibleChamps.delete(id);
    el.classList.remove('active');
  } else {
    visibleChamps.add(id);
    el.classList.add('active');
  }
  saveChampPrefs();
  applyVisibility();
}

function selectAll() {
  CATEGORIES.forEach(c => visibleChamps.add(c.id));
  buildSidebarList();
  saveChampPrefs();
  applyVisibility();
}

function clearAll() {
  visibleChamps.clear();
  buildSidebarList();
  saveChampPrefs();
  applyVisibility();
}

function applyVisibility() {
  CATEGORIES.forEach(cat => {
    const col = document.querySelector('.column.' + cat.cls);
    if (col) col.style.display = visibleChamps.has(cat.id) ? '' : 'none';
  });
  // Update grid column count to match visible columns
  const visibleCount = visibleChamps.size || 1;
  document.querySelector('.grid').style.gridTemplateColumns =
    `repeat(${visibleCount}, minmax(260px, 1fr))`;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

buildSidebarList();

// ---- Preferiti ----
const FAV_KEY = 'overrevving_favorites';
let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

function toggleFav(key) {
  if (favorites.has(key)) {
    favorites.delete(key);
  } else {
    favorites.add(key);
  }
  localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  document.querySelectorAll(`[data-fav="${key}"]`).forEach(tr => {
    tr.classList.toggle('favorite', favorites.has(key));
    const btn = tr.querySelector('.fav-btn');
    if (btn) btn.classList.toggle('active', favorites.has(key));
  });
}

function loadCountdown() {
  if (countdownStarted) return;
  countdownStarted = true;
  // Start countdown for each category independently
  ['motogp', 'moto2', 'moto3', 'sbk', 'mxgp', 'mx2', 'f1'].forEach(catId => {
    const cal = CALENDARS_2026[catId];
    if (!cal) return;
    const now = new Date();
    const next = cal.find(e => new Date(e.date + 'T00:00:00') > now);
    const el = document.getElementById('countdown-' + catId);
    if (!el) return;
    if (!next) { el.textContent = '🏁 Season concluded'; return; }
    startCategoryCountdown(el, new Date(next.date + 'T00:00:00'), next.name);
  });
}

function startCategoryCountdown(el, targetDate, name) {
  function tick() {
    const now = new Date();
    const diff = targetDate - now;
    if (diff <= 0) { el.textContent = '🏁 Round in progress!'; return; }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    el.textContent = `🏁 → ${name}: ${days}d ${hours}h`;
  }
  tick();
  setInterval(tick, 60 * 1000);
}



loadAndRender();

function formatName(fullName) {
  const parts = fullName.trim().split(' ');
  if (parts.length < 2) return fullName;
  // Normalizza ogni parola: se è tutta maiuscola, la converte in Title Case
  const normalized = parts.map(w =>
    w === w.toUpperCase() && w.length > 1
      ? w.charAt(0) + w.slice(1).toLowerCase()
      : w
  );
  // Iniziale del nome + punto + cognome (anche composto)
  return normalized[0][0].toUpperCase() + '. ' + normalized.slice(1).join(' ');
}
