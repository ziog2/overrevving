<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorsport Standings 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e22;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
    color: #f0f0f0;
  }
  h1 {
    text-align: center; font-size: 22px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #e0e0e0; margin-bottom: 6px;
  }
  .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 4px; }
  .last-updated { text-align: center; font-size: 12px; color: #666; letter-spacing: 0.03em; margin-bottom: 24px; }
  .logo-banner { text-align: center; margin: 10px 0 6px; }
  .site-logo { max-width: 420px; width: 70%; height: auto; opacity: 0.92; transition: opacity 0.2s; border: 1px solid #3a3a42; border-radius: 14px; padding: 6px 20px; background: #2c2c32; }
  .site-logo:hover { opacity: 1; }
  /* Sidebar menu */
  .menu-btn {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    width: 42px; height: 42px; border-radius: 8px;
    background: #2c2c32; border: 1px solid #3a3a42;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    transition: background 0.2s;
  }
  .menu-btn:hover { background: #3a3a42; }
  .menu-btn span {
    display: block; width: 20px; height: 2px;
    background: #ccc; border-radius: 2px;
  }
  .sidebar {
    position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
    background: #2a2a30; border-left: 1px solid #3a3a42;
    z-index: 300; transition: right 0.3s ease;
    display: flex; flex-direction: column;
    padding: 20px 16px; box-shadow: -4px 0 20px rgba(0,0,0,0.4);
    overflow-y: auto;
  }
  .sidebar.open { right: 0; }
  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 299; display: none;
  }
  .sidebar-overlay.open { display: block; }
  .sidebar h3 {
    font-size: 13px; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 20px; margin-top: 4px;
  }
  .sidebar-close {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; color: #888;
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .sidebar-close:hover { color: #ddd; }
  .champ-toggle {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; margin-bottom: 6px;
    transition: background 0.15s; user-select: none;
  }
  .champ-toggle:hover { background: #333340; }
  .champ-toggle input { display: none; }
  .champ-dot {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }
  .champ-label { font-size: 14px; color: #ddd; flex: 1; }
  .champ-check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid #555; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.15s;
  }
  .champ-toggle.active .champ-check {
    background: #3d6bbd; border-color: #3d6bbd; color: #fff;
  }
  .champ-check::after { content: ''; display: none; }
  .champ-toggle.active .champ-check::after {
    content: '✓'; display: block; font-size: 11px; font-weight: 700; color: #fff;
  }
  .sidebar-actions {
    display: flex; gap: 8px; margin-top: 8px; margin-bottom: 20px;
  }
  .sidebar-btn {
    flex: 1; padding: 7px; border-radius: 7px; border: 1px solid #444;
    background: transparent; color: #888; font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .sidebar-btn:hover { background: #333340; color: #ddd; }
  #reset-order-btn { flex: none; width: 100%; margin-top: 4px; margin-bottom: 20px; }
  .sidebar-social { margin-top: 20px; padding-top: 20px; border-top: 1px solid #3a3a42; }
  .sidebar-social h4 { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .social-icons { display: flex; gap: 12px; justify-content: center; }
  .social-icon {
    width: 38px; height: 38px; border-radius: 8px;
    background: #333340; border: 1px solid #3a3a42;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: background 0.2s, transform 0.15s;
    color: #ccc;
  }
  .social-icon:hover { background: #3a3a50; transform: translateY(-2px); }
  .social-icon svg { width: 18px; height: 18px; fill: currentColor; }
  .grid-wrapper {
    overflow-x: auto;
    padding: 0 16px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 275px);
    gap: 16px;
    width: fit-content;
    margin: 0 auto;
  }
  .column { background: #2c2c32; border-radius: 14px; overflow: hidden; border: 1px solid #3a3a42; cursor: grab; }
  .column:active { cursor: grabbing; }
  .column.sortable-ghost { opacity: 0.4; }
  .column.sortable-chosen { box-shadow: 0 0 0 2px #3d6bbd; }
  .col-header {
    padding: 14px 16px 12px; text-align: center; font-size: 15px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid #3a3a42;
  }
  .motogp .col-header { background: #c0392b; color: #fff; }
  .moto2  .col-header { background: #e67e22; color: #fff; }
  .moto3  .col-header { background: #27ae60; color: #fff; }
  .sbk    .col-header { background: #2980b9; color: #fff; }
  .f1     .col-header { background: #e10600; color: #fff; }
  .mxgp   .col-header { background: #ff6b00; color: #fff; }
  .mx2    .col-header { background: #f0a500; color: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 7px 8px; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase; color: #888;
    border-bottom: 1px solid #3a3a42; background: #252528;
  }
  thead th:first-child { text-align: center; width: 28px; }
  thead th:last-child  { text-align: right; }
  tbody tr { border-bottom: 1px solid #3a3a42; }
  tbody tr:nth-child(even) { background: #28282e; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #333340; }
  tbody td { padding: 8px 8px; color: #ddd; vertical-align: middle; }
  tbody td:first-child { text-align: center; font-weight: 700; color: #aaa; font-size: 12px; width: 28px; }
  tbody td:last-child  { text-align: right; font-weight: 700; color: #f0c040; font-size: 14px; }
  .pos-1 td:first-child { color: #ffd700; }
  .pos-2 td:first-child { color: #c0c0c0; }
  .pos-3 td:first-child { color: #cd7f32; }
  .driver-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .next-round { font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: normal; margin-top: 4px; opacity: 0.9; }
  .visitor-counter { text-align: center; margin-top: 40px; padding-top: 20px; }
  .visitor-counter img { vertical-align: middle; image-rendering: pixelated; }
  .visitor-counter-label { font-size: 11px; color: #555; margin-bottom: 6px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; }
  .loading { text-align: center; color: #555; padding: 60px 0; font-size: 14px; }
  @media (max-width: 700px) { body { padding: 16px 20px 40px; } #reset-order-btn { display: none; } }
  tbody tr.favorite { background: #2a1f3a !important; }
  tbody tr.favorite:hover { background: #332545 !important; }
  .fav-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 4px; opacity: 0.3; transition: opacity 0.15s, color 0.15s; line-height: 1; color: #999; }
  .fav-btn.active { opacity: 1; color: #ffd700; }
  .fav-btn:hover { opacity: 0.8; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script>
const BIN_ID = '6a3064e4f5f4af5e29f7958b';
const API_KEY = '$2a$10$2L.MrbfdS65XDm66PZZX4eBYUV6s5aSf3eZB8YafsKpQpxMc7VNwe';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

const CATEGORIES = [
  { id: 'motogp', label: 'MotoGP', cls: 'motogp', url: 'https://www.motogp.com/en/world-standing/2026/motogp/championship-standings' },
  { id: 'moto2',  label: 'Moto2',  cls: 'moto2',  url: 'https://www.motogp.com/en/world-standing/2026/moto2/championship-standings' },
  { id: 'moto3',  label: 'Moto3',  cls: 'moto3',  url: 'https://www.motogp.com/en/world-standing/2026/moto3/championship-standings' },
  { id: 'sbk',    label: 'SBK',    cls: 'sbk',    url: 'https://www.worldsbk.com/en/standings/riders/2026/SBK' },
  { id: 'mxgp',   label: 'MXGP',   cls: 'mxgp',   url: 'https://mxgpresults.com/mxgp/standings' },
  { id: 'mx2',    label: 'MX2',    cls: 'mx2',    url: 'https://mxgpresults.com/mx2/standings' },
  { id: 'f1',     label: 'F1',     cls: 'f1',     url: 'https://www.mclaren.com/racing/formula-1/standings/' },
];

async function loadAndRender() {
  try {
    const res = await fetch(BIN_URL, {
      headers: { 'X-Access-Key': API_KEY }
    });
    if (!res.ok) throw new Error('Errore caricamento dati');
    const json = await res.json();
    const all = json.record;
    renderAll(all);
  } catch(e) {
    document.getElementById('standings-grid').innerHTML =
      '<div class="loading" style="color:#ca5f5f">⚠ Error loading standings</div>';
    document.getElementById('last-updated').textContent = '';
  }
}

function renderAll(all) {
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const riders = all[cat.id] || [];
    const col = document.createElement('div');
    col.className = 'column ' + cat.cls;
    let rows = '';
    if (riders.length === 0) {
      rows = '<tr><td colspan="3" style="text-align:center;color:#555;padding:20px;font-size:12px;">No data available</td></tr>';
    } else {
      const leader = riders[0].pts;
      riders.forEach((r, i) => {
        const pc = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
        const gap = i === 0 ? '' : `<span style="font-weight:normal;color:#666;font-size:11px;margin-left:4px">-${leader - r.pts}</span>`;
        const shortName = formatName(r.name);
        const favKey = cat.id + ':' + r.name;
        const isFav = favorites.has(favKey);
        rows += `<tr class="${pc}${isFav ? ' favorite' : ''}" data-fav="${favKey}">
          <td>${i+1}</td>
          <td><div class="driver-name" title="${r.name}">${shortName}</div></td>
          <td>${r.pts}${gap}</td>
          <td style="width:20px;padding:4px 6px"><button class="fav-btn${isFav ? ' active' : ''}" onclick="toggleFav('${favKey}')" title="Favourite rider">★</button></td>
        </tr>`;
      });
    }
    const hasDetailPage = ['motogp', 'moto2', 'moto3'].includes(cat.id);
    const headerLink = hasDetailPage
      ? `<a href="category.html?cat=${cat.id}" style="color:inherit;text-decoration:none;">${cat.label} →</a>`
      : `<a href="${cat.url}" target="_blank" style="color:inherit;text-decoration:none;">${cat.label} ↗</a>`;
    col.innerHTML =
      `<div class="col-header">
        ${headerLink}
        <div class="next-round" id="countdown-${cat.id}">🏁 → Loading...</div>
      </div>` +
      `<table><thead><tr><th>#</th><th>Rider</th><th>Pts</th><th style="width:20px"></th></tr></thead><tbody>${rows}</tbody></table>`;
    grid.appendChild(col);
  });
  const ts = all['_updated'];
  document.getElementById('last-updated').textContent = ts ? 'Last updated: ' + ts : '';
  // Avvia countdown dopo che il DOM è pronto
  loadCountdown();
  applyOrder();
  applyVisibility();
  initSortable();
}

// ---- Sidebar championship selector ----
const CHAMP_COLORS = {
  motogp: '#c0392b', moto2: '#e67e22', moto3: '#27ae60',
  sbk: '#2980b9', mxgp: '#ff6b00', mx2: '#f0a500', f1: '#e10600'
};

let visibleChamps = new Set(
  JSON.parse(localStorage.getItem('overrevving_champs') ||
  JSON.stringify(CATEGORIES.map(c => c.id)))
);

function saveChampPrefs() {
  localStorage.setItem('overrevving_champs', JSON.stringify([...visibleChamps]));
}

function buildSidebarList() {
  const list = document.getElementById('champ-list');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const active = visibleChamps.has(cat.id);
    const div = document.createElement('div');
    div.className = 'champ-toggle' + (active ? ' active' : '');
    div.dataset.id = cat.id;
    div.innerHTML = `
      <div class="champ-dot" style="background:${CHAMP_COLORS[cat.id]}"></div>
      <span class="champ-label">${cat.label}</span>
      <div class="champ-check"></div>`;
    div.onclick = () => toggleChamp(cat.id, div);
    list.appendChild(div);
  });
}

function toggleChamp(id, el) {
  if (visibleChamps.has(id)) {
    visibleChamps.delete(id);
    el.classList.remove('active');
  } else {
    visibleChamps.add(id);
    el.classList.add('active');
  }
  saveChampPrefs();
  applyVisibility();
}

function selectAll() {
  CATEGORIES.forEach(c => visibleChamps.add(c.id));
  buildSidebarList();
  saveChampPrefs();
  applyVisibility();
}

function clearAll() {
  visibleChamps.clear();
  buildSidebarList();
  saveChampPrefs();
  applyVisibility();
}

function applyVisibility() {
  CATEGORIES.forEach(cat => {
    const col = document.querySelector('.column.' + cat.cls);
    if (col) col.style.display = visibleChamps.has(cat.id) ? '' : 'none';
  });
  const visibleCount = visibleChamps.size || 1;
  const gridEl = document.querySelector('.grid');
  if (gridEl) gridEl.style.gridTemplateColumns = `repeat(${visibleCount}, 275px)`;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

// ---- Drag & drop column ordering ----
const ORDER_KEY = 'overrevving_order';

function loadOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(ORDER_KEY));
    if (saved && Array.isArray(saved)) return saved;
  } catch(e) {}
  return CATEGORIES.map(c => c.id);
}

function saveOrder() {
  const cols = [...document.querySelectorAll('.grid .column')];
  const order = cols.map(col => {
    const cls = [...col.classList].find(c => CATEGORIES.some(cat => cat.cls === c));
    const cat = CATEGORIES.find(c => c.cls === cls);
    return cat ? cat.id : null;
  }).filter(Boolean);
  localStorage.setItem(ORDER_KEY, JSON.stringify(order));
}

function applyOrder() {
  // Su mobile mantieni sempre l'ordine fisso predefinito
  const order = window.innerWidth <= 700
    ? CATEGORIES.map(c => c.id)
    : loadOrder();
  const grid = document.getElementById('standings-grid');
  order.forEach(id => {
    const cat = CATEGORIES.find(c => c.id === id);
    if (!cat) return;
    const col = grid.querySelector('.column.' + cat.cls);
    if (col) grid.appendChild(col);
  });
}

function initSortable() {
  const grid = document.getElementById('standings-grid');
  if (!grid || !window.Sortable) return;
  if (window.innerWidth <= 700) return; // disabilita drag & drop su mobile
  Sortable.create(grid, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: () => {
      saveOrder();
      applyVisibility();
    }
  });
}

function resetOrder() {
  localStorage.removeItem(ORDER_KEY);
  location.reload();
}

function loadCountdown() {
  if (countdownStarted) return;
  countdownStarted = true;
  // Start countdown for each category independently
  ['motogp', 'moto2', 'moto3', 'sbk', 'mxgp', 'mx2', 'f1'].forEach(catId => {
    const cal = CALENDARS_2026[catId];
    if (!cal) return;
    const now = new Date();
    const next = cal.find(e => new Date(e.date + 'T00:00:00') > now);
    const el = document.getElementById('countdown-' + catId);
    if (!el) return;
    if (!next) { el.textContent = '🏁 Season concluded'; return; }
    startCategoryCountdown(el, new Date(next.date + 'T00:00:00'), next.name);
  });
}

function startCategoryCountdown(el, targetDate, name) {
  function tick() {
    const now = new Date();
    const diff = targetDate - now;
    if (diff <= 0) { el.textContent = '🏁 Round in progress!'; return; }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    el.textContent = `🏁 → ${name}: ${days}d ${hours}h`;
  }
  tick();
  setInterval(tick, 60 * 1000);
}



// ---- Preferiti ----
const FAV_KEY = 'overrevving_favorites';
let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

function toggleFav(key) {
  if (favorites.has(key)) {
    favorites.delete(key);
  } else {
    favorites.add(key);
  }
  localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  document.querySelectorAll(`[data-fav="${key}"]`).forEach(tr => {
    tr.classList.toggle('favorite', favorites.has(key));
    const btn = tr.querySelector('.fav-btn');
    if (btn) btn.classList.toggle('active', favorites.has(key));
  });
}

function formatName(fullName) {
  const parts = fullName.trim().split(' ');
  if (parts.length < 2) return fullName;
  // Normalizza ogni parola: se è tutta maiuscola, la converte in Title Case
  const normalized = parts.map(w =>
    w === w.toUpperCase() && w.length > 1
      ? w.charAt(0) + w.slice(1).toLowerCase()
      : w
  );
  // Iniziale del nome + punto + cognome (anche composto)
  return normalized[0][0].toUpperCase() + '. ' + normalized.slice(1).join(' ');
}
