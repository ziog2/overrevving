<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifiche Motorsport 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e22;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
    color: #f0f0f0;
  }
  h1 {
    text-align: center; font-size: 22px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #e0e0e0; margin-bottom: 6px;
  }
  .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 4px; }
  .last-updated { text-align: center; font-size: 12px; color: #666; letter-spacing: 0.03em; margin-bottom: 24px; }
  .logo-banner { text-align: center; margin: 10px 0 6px; }
  .site-logo { max-width: 420px; width: 70%; height: auto; opacity: 0.92; transition: opacity 0.2s; border: 1px solid #3a3a42; border-radius: 14px; padding: 14px 20px; background: #2c2c32; }
  .site-logo:hover { opacity: 1; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; max-width: 1600px; margin: 0 auto;
  }
  .column { background: #2c2c32; border-radius: 14px; overflow: hidden; border: 1px solid #3a3a42; }
  .col-header {
    padding: 14px 16px 12px; text-align: center; font-size: 15px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid #3a3a42;
  }
  .motogp .col-header { background: #c0392b; color: #fff; }
  .moto2  .col-header { background: #e67e22; color: #fff; }
  .moto3  .col-header { background: #27ae60; color: #fff; }
  .sbk    .col-header { background: #2980b9; color: #fff; }
  .f1     .col-header { background: #e10600; color: #fff; }
  .mxgp   .col-header { background: #ff6b00; color: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 7px 8px; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase; color: #888;
    border-bottom: 1px solid #3a3a42; background: #252528;
  }
  thead th:first-child { text-align: center; width: 28px; }
  thead th:last-child  { text-align: right; }
  tbody tr { border-bottom: 1px solid #3a3a42; }
  tbody tr:nth-child(even) { background: #28282e; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #333340; }
  tbody td { padding: 8px 8px; color: #ddd; vertical-align: middle; }
  tbody td:first-child { text-align: center; font-weight: 700; color: #aaa; font-size: 12px; width: 28px; }
  tbody td:last-child  { text-align: right; font-weight: 700; color: #f0c040; font-size: 14px; }
  .pos-1 td:first-child { color: #ffd700; }
  .pos-2 td:first-child { color: #c0c0c0; }
  .pos-3 td:first-child { color: #cd7f32; }
  .driver-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .next-round { font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: normal; margin-top: 4px; opacity: 0.9; }
  .visitor-counter { text-align: center; margin-top: 40px; padding-top: 20px; }
  .visitor-counter img { vertical-align: middle; image-rendering: pixelated; }
  .visitor-counter-label { font-size: 11px; color: #555; margin-bottom: 6px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; }
  .loading { text-align: center; color: #555; padding: 60px 0; font-size: 14px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } body { padding: 16px 40px 40px; } }
  tbody tr.favorite { background: #2a1f3a !important; }
  tbody tr.favorite:hover { background: #332545 !important; }
  .fav-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 4px; opacity: 0.3; transition: opacity 0.15s, color 0.15s; line-height: 1; color: #999; }
  .fav-btn.active { opacity: 1; color: #ffd700; }
  .fav-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<h1>Classifiche Motorsport 2026</h1>
<div class="logo-banner">
  <a href="https://www.etsy.com/shop/Overrevving" target="_blank" rel="noopener">
    <img src="logo.png" alt="Overrevving" class="site-logo">
  </a>
</div>
<div class="last-updated" id="last-updated">Caricamento...</div>
<div class="grid" id="standings-grid"><div class="loading">⏳ Caricamento classifiche...</div></div>

<div class="visitor-counter">
  <div class="visitor-counter-label">VISITATORI</div>
  <a href="https://hits.sh/overrevving.it/" target="_blank" rel="noopener">
    <img src="https://hits.sh/overrevving.it.svg?style=for-the-badge&label=&color=2c2c32&labelColor=1e1e22&logo=none" alt="Contatore visite" height="26">
  </a>
</div>

<script>
const BIN_ID  = '6a3064e4f5f4af5e29f7958b';
const API_KEY = '$2a$10$2L.MrbfdS65XDm66PZZX4eBYUV6s5aSf3eZB8YafsKpQpxMc7VNwe';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

const CATEGORIES = [
  { id: 'motogp', label: 'MotoGP', cls: 'motogp', url: 'https://www.motogp.com/en/world-standing/2026/motogp/championship-standings' },
  { id: 'moto2',  label: 'Moto2',  cls: 'moto2',  url: 'https://www.motogp.com/en/world-standing/2026/moto2/championship-standings' },
  { id: 'moto3',  label: 'Moto3',  cls: 'moto3',  url: 'https://www.motogp.com/en/world-standing/2026/moto3/championship-standings' },
  { id: 'sbk',    label: 'SBK',    cls: 'sbk',    url: 'https://www.worldsbk.com/en/standings/riders/2026/SBK' },
  { id: 'mxgp',   label: 'MXGP',   cls: 'mxgp',   url: 'https://mxgpresults.com/mxgp/standings' },
  { id: 'f1',     label: 'F1',     cls: 'f1',     url: 'https://www.mclaren.com/racing/formula-1/standings/' },
];

async function loadAndRender() {
  try {
    const res = await fetch(BIN_URL, {
      headers: { 'X-Access-Key': API_KEY }
    });
    if (!res.ok) throw new Error('Errore caricamento dati');
    const json = await res.json();
    const all = json.record;
    renderAll(all);
  } catch(e) {
    document.getElementById('standings-grid').innerHTML =
      '<div class="loading" style="color:#ca5f5f">⚠ Errore caricamento classifiche</div>';
    document.getElementById('last-updated').textContent = '';
  }
}

function renderAll(all) {
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const riders = all[cat.id] || [];
    const col = document.createElement('div');
    col.className = 'column ' + cat.cls;
    let rows = '';
    if (riders.length === 0) {
      rows = '<tr><td colspan="3" style="text-align:center;color:#555;padding:20px;font-size:12px;">Dati non disponibili</td></tr>';
    } else {
      const leader = riders[0].pts;
      riders.forEach((r, i) => {
        const pc = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
        const gap = i === 0 ? '' : `<span style="font-weight:normal;color:#666;font-size:11px;margin-left:4px">-${leader - r.pts}</span>`;
        const shortName = formatName(r.name);
        const favKey = cat.id + ':' + r.name;
        const isFav = favorites.has(favKey);
        rows += `<tr class="${pc}${isFav ? ' favorite' : ''}" data-fav="${favKey}">
          <td>${i+1}</td>
          <td><div class="driver-name" title="${r.name}">${shortName}</div></td>
          <td>${r.pts}${gap}</td>
          <td style="width:20px;padding:4px 6px"><button class="fav-btn${isFav ? ' active' : ''}" onclick="toggleFav('${favKey}')" title="Pilota preferito">★</button></td>
        </tr>`;
      });
    }
    col.innerHTML =
      `<div class="col-header">
        <a href="${cat.url}" target="_blank" style="color:inherit;text-decoration:none;">${cat.label} ↗</a>
        ${['motogp','moto2','moto3'].includes(cat.id) ? `<div class="next-round" id="countdown-${cat.id}">⏳ Caricamento...</div>` : ''}
      </div>` +
      `<table><thead><tr><th>#</th><th>Pilota</th><th>Pts</th><th style="width:20px"></th></tr></thead><tbody>${rows}</tbody></table>`;
    grid.appendChild(col);
  });
  const ts = all['_updated'];
  document.getElementById('last-updated').textContent = ts ? 'Ultimo aggiornamento: ' + ts : '';
}

// ---- Preferiti ----
const FAV_KEY = 'overrevving_favorites';
let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

function toggleFav(key) {
  if (favorites.has(key)) {
    favorites.delete(key);
  } else {
    favorites.add(key);
  }
  localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  document.querySelectorAll(`[data-fav="${key}"]`).forEach(tr => {
    tr.classList.toggle('favorite', favorites.has(key));
    const btn = tr.querySelector('.fav-btn');
    if (btn) btn.classList.toggle('active', favorites.has(key));
  });
}

// ---- Countdown prossimo round (MotoGP/Moto2/Moto3) ----
// Calendario MotoGP 2026 — date gara domenica (ora locale italiana)
const MOTOGP_2026 = [
  { name: 'Qatar',       date: '2026-03-01' },
  { name: 'Tailandia',   date: '2026-03-29' },
  { name: 'Argentina',   date: '2026-04-12' },
  { name: 'USA (COTA)',  date: '2026-04-19' },
  { name: 'Spagna',      date: '2026-05-03' },
  { name: 'Francia',     date: '2026-05-17' },
  { name: 'Catalogna',   date: '2026-05-31' },
  { name: 'Italia',      date: '2026-06-07' },
  { name: 'Olanda',      date: '2026-06-28' },
  { name: 'Germania',    date: '2026-07-12' },
  { name: 'Gran Bretagna', date: '2026-08-02' },
  { name: 'Austria',     date: '2026-08-16' },
  { name: 'San Marino',  date: '2026-09-06' },
  { name: 'Aragona',     date: '2026-09-20' },
  { name: 'Giappone',    date: '2026-10-04' },
  { name: 'Indonesia',   date: '2026-10-18' },
  { name: 'Australia',   date: '2026-10-25' },
  { name: 'Malesia',     date: '2026-11-01' },
  { name: 'Valencia',    date: '2026-11-08' },
];

function loadCountdown() {
  const now = new Date();
  const next = MOTOGP_2026.find(e => new Date(e.date + 'T00:00:00') > now);
  if (!next) {
    ['motogp', 'moto2', 'moto3'].forEach(catId => {
      const el = document.getElementById('countdown-' + catId);
      if (el) el.textContent = '🏁 Stagione conclusa';
    });
    return;
  }
  startCountdownTicker(new Date(next.date + 'T00:00:00'), next.name);
}

function startCountdownTicker(targetDate, circuitName) {
  function tick() {
    const now = new Date();
    const diff = targetDate - now;
    let text;
    if (diff <= 0) {
      text = '🏁 Round in corso!';
    } else {
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      text = `⏳ ${circuitName}: ${days}g ${hours}h`;
    }
    ['motogp', 'moto2', 'moto3'].forEach(catId => {
      const el = document.getElementById('countdown-' + catId);
      if (el) el.textContent = text;
    });
  }
  tick();
  setInterval(tick, 60 * 1000); // aggiorna ogni minuto
}

loadCountdown();
loadAndRender();

function formatName(fullName) {
  const parts = fullName.trim().split(' ');
  if (parts.length < 2) return fullName;
  // Normalizza ogni parola: se è tutta maiuscola, la converte in Title Case
  const normalized = parts.map(w =>
    w === w.toUpperCase() && w.length > 1
      ? w.charAt(0) + w.slice(1).toLowerCase()
      : w
  );
  // Iniziale del nome + punto + cognome (anche composto)
  return normalized[0][0].toUpperCase() + '. ' + normalized.slice(1).join(' ');
}
</script>
</body>
</html>
