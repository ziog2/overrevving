<script>
function formatName(fullName) {
  const parts = fullName.trim().split(' ');
  if (parts.length < 2) return fullName;
  // Normalizza ogni parola: se è tutta maiuscola, la converte in Title Case
  const normalized = parts.map(w =>
    w === w.toUpperCase() && w.length > 1
      ? w.charAt(0) + w.slice(1).toLowerCase()
      : w
  );
  // Iniziale del nome + punto + cognome (anche composto)
  return normalized[0][0].toUpperCase() + '. ' + normalized.slice(1).join(' ');
}

// ---- JSONBin ----
let currentData = { motogp:[], moto2:[], moto3:[], sbk:[], f1:[], _updated:'' };

async function loadFromBin() {

    const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Access-Key': API_KEY } });

// ---- PDF multi-upload ----
const FILE_MAP = { 'sbk':'sbk' };

// ---- Importa PDF SBK direttamente dalla cartella data/ del repository ----
async function fetchSBKFromRepo() {
  const statusDiv = document.getElementById('global-status');
  statusDiv.innerHTML = '<div class="gstatus load" id="gs-sbk">⏳ Lettura data/SBK.pdf…</div>';
  const setTag = (cls, msg) => {
    const el = document.getElementById('gs-sbk');
    if (el) { el.className = 'gstatus ' + cls; el.textContent = msg; }
  };
  try {
    // Cache-busting per evitare che il browser mostri una versione vecchia del file
    const res = await fetch('data/SBK.pdf?t=' + Date.now());
    if (!res.ok) throw new Error('File non trovato (HTTP ' + res.status + ')');
    const buf = await res.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    
    let ridersPage = null, ridersTokens = null;
    let constPage = null, constTokens = null;
    const teamPages = [];

    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      const fullText = content.items.map(it => it.str).join(' ');
      const lowerText = fullText.toLowerCase();
      
      const hasRiders = lowerText.includes('riders') && lowerText.includes('standings') && !lowerText.includes('independent');
      const hasConst = lowerText.includes('manufacturer') && lowerText.includes('standings');
      const hasTeams = lowerText.includes('teams') && lowerText.includes('standings') && !lowerText.includes('referent') && !lowerText.includes('independent');

      if (hasRiders) {
        ridersPage = page;
        ridersTokens = content;
      } else if (hasConst) {
        constPage = page;
        constTokens = content;
      } else if (hasTeams) {
        teamPages.push({ page, content });
      }
    }

    if (!ridersPage) throw new Error('Pagina Riders Standings non trovata nel PDF');
    
    // Parse Riders
    const pageH_riders = ridersPage.getViewport({ scale: 1 }).height;
    const tokens_riders = ridersTokens.items
      .filter(it => it.str && it.str.trim())
      .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH_riders - it.transform[5] }));
    const riders = parseSBK(tokens_riders);
    if (riders.length === 0) throw new Error('Nessun pilota trovato nel PDF');
    currentData['sbk'] = riders;

    // Parse Constructors
    let constructors = [];
    if (constPage) {
      const pageH_const = constPage.getViewport({ scale: 1 }).height;
      const tokens_const = constTokens.items
        .filter(it => it.str && it.str.trim())
        .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH_const - it.transform[5] }));
      constructors = parseSBKConstructors(tokens_const);
      currentData['sbk_constructors'] = constructors;
    }

    // Parse Teams
    let teams = [];
    if (teamPages.length > 0) {
      for (const tp of teamPages) {
        const pageH_team = tp.page.getViewport({ scale: 1 }).height;
        const pageTokens = tp.content.items
          .filter(it => it.str && it.str.trim())
          .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH_team - it.transform[5] }));
        const pageTeams = parseSBKTeams(pageTokens);
        teams.push(...pageTeams);
      }
      currentData['sbk_teams'] = teams;
    }

    await saveToBin();
    renderAll();
    setTag('ok', `✓ SBK — ${riders.length} piloti, ${constructors.length} costruttori, ${teams.length} team importati da data/SBK.pdf`);
  } catch (err) {
    setTag('err', '⚠ Errore: ' + err.message);
  }
}

async function handleMultiPDF(e) {
  const files = [...e.target.files];
  e.target.value = '';
  if (!files.length) return;
  const statusDiv = document.getElementById('global-status');
  statusDiv.innerHTML = '';
  const tasks = [], unknown = [];
  for (const file of files) {
    const base = file.name.replace(/\.pdf$/i,'').toLowerCase().trim();
    const catId = FILE_MAP[base];
    if (catId) {
      const tag = document.createElement('div');
      tag.className = 'gstatus load'; tag.id = 'gs-' + catId;
      tag.textContent = '⏳ ' + file.name + ' — lettura in corso…';
      statusDiv.appendChild(tag);
      tasks.push({ file, catId });
    } else { unknown.push(file.name); }
  }
  if (unknown.length) {
    const tag = document.createElement('div');
    tag.className = 'gstatus err';
    tag.textContent = '⚠ File non riconosciuti (usa SBK.pdf): ' + unknown.join(', ');
    statusDiv.appendChild(tag);
  }
  await Promise.all(tasks.map(({ file, catId }) => processPDF(file, catId)));
  // Salva tutto su JSONBin dopo aver processato tutti i PDF
  try {
    await saveToBin();
    renderAll();
  } catch(e) {
    showGlobalStatus('err', '⚠ Errore salvataggio su JSONBin: ' + e.message);
  }
}

async function processPDF(file, catId) {
  const setTag = (cls, msg) => {
    const el = document.getElementById('gs-' + catId);
    if (el) { el.className = 'gstatus ' + cls; el.textContent = msg; }
  };
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    
    if (catId === 'sbk') {
      let ridersPage = null, ridersTokens = null;
      let constPage = null, constTokens = null;
      const teamPages = [];

      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        const fullText = content.items.map(it => it.str).join(' ');
        const lowerText = fullText.toLowerCase();
        
        const hasRiders = lowerText.includes('riders') && lowerText.includes('standings') && !lowerText.includes('independent');
        const hasConst = lowerText.includes('manufacturer') && lowerText.includes('standings');
        const hasTeams = lowerText.includes('teams') && lowerText.includes('standings') && !lowerText.includes('referent') && !lowerText.includes('independent');

        if (hasRiders) {
          ridersPage = page;
          ridersTokens = content;
        } else if (hasConst) {
          constPage = page;
          constTokens = content;
        } else if (hasTeams) {
          teamPages.push({ page, content });
        }
      }

      if (!ridersPage) throw new Error('Pagina Riders Standings non trovata nel PDF');
      
      const pageH_riders = ridersPage.getViewport({ scale: 1 }).height;
      const tokens_riders = ridersTokens.items
        .filter(it => it.str && it.str.trim())
        .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH_riders - it.transform[5] }));
      const riders = parseSBK(tokens_riders);
      if (riders.length === 0) throw new Error('Nessun pilota trovato nel PDF');
      currentData['sbk'] = riders;

      let constructors = [];
      if (constPage) {
        const pageH_const = constPage.getViewport({ scale: 1 }).height;
        const tokens_const = constTokens.items
          .filter(it => it.str && it.str.trim())
          .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH_const - it.transform[5] }));
        constructors = parseSBKConstructors(tokens_const);
        currentData['sbk_constructors'] = constructors;
      }

      let teams = [];
      if (teamPages.length > 0) {
        for (const tp of teamPages) {
          const pageH_team = tp.page.getViewport({ scale: 1 }).height;
          const pageTokens = tp.content.items
            .filter(it => it.str && it.str.trim())
            .map(it => ({ text: it.str.trim(), x: pageH_team - it.transform[5] }));
          const pageTeams = parseSBKTeams(pageTokens);
          teams.push(...pageTeams);
        }
        currentData['sbk_teams'] = teams;
      }

      setTag('ok', `✓ ${file.name} — ${riders.length} piloti, ${constructors.length} costruttori, ${teams.length} team`);
    } else {
      const page = await pdf.getPage(1);
      const content = await page.getTextContent();
      const pageH = page.getViewport({ scale: 1 }).height;
      const tokens = content.items
        .filter(it => it.str && it.str.trim())
        .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH - it.transform[5] }));
      const riders = parseStandings(tokens);
      if (riders.length === 0) { setTag('err', '⚠ ' + file.name + ' — nessun pilota trovato'); return; }
      currentData[catId] = riders;
      setTag('ok', '✓ ' + file.name + ' — ' + riders.length + ' piloti');
    }
  } catch(err) {
    setTag('err', '⚠ ' + file.name + ' — ' + err.message);
  }
}

// ---- Parser MotoGP/Moto2/Moto3 ----
function parseStandings(tokens) {
  // Group tokens by X-coordinate (within 4px tolerance)
  const colMap = new Map();
  for (const t of tokens) {
    const x = Math.round(t.x); let key = null;
    for (const k of colMap.keys()) { if (Math.abs(x - key) <= 4) { key = k; break; } }
    if (key === null) { key = x; colMap.set(key, []); }
    colMap.get(key).push(t);
  }

  const sortedKeys = [...colMap.keys()].sort((a, b) => a - b);
  const riders = [];

  for (const surnameX of sortedKeys) {
    const surnameCol = colMap.get(surnameX).sort((a, b) => b.y - a.y);
    if (surnameCol.length < 3) continue;

    // Search for surname token in this column
    let surnameTok = null;
    for (const t of surnameCol) {
      const txt = t.text;
      if (/^[A-ZÁÀÉÈÍÌÓÒÚÙÑÜÇ\s\-']+$/.test(txt) && txt === txt.toUpperCase() && txt.length > 1) {
        if (txt === 'RIDER' || txt === 'POINTS' || txt === 'LEADER' || txt === 'PREV') continue;
        surnameTok = txt;
        break;
      }
    }
    if (!surnameTok) continue;

    // Find matching first name column to the right (X difference between 8 and 16)
    let firstNameCol = null;
    for (const fx of sortedKeys) {
      const diff = fx - surnameX;
      if (diff >= 8 && diff <= 16) {
        firstNameCol = colMap.get(fx).sort((a, b) => b.y - a.y);
        break;
      }
    }
    if (!firstNameCol) continue;

    // Find country/first name token in first name column
    let firstNameCountryTok = null;
    for (const t of firstNameCol) {
      if (/\[[A-Z]{3}\]$/.test(t.text)) {
        firstNameCountryTok = t.text;
        break;
      }
    }
    if (!firstNameCountryTok) continue;

    // Find position token (a small number at the top)
    let posTok = null;
    for (const t of surnameCol) {
      if (/^\d+$/.test(t.text)) {
        const posVal = parseInt(t.text, 10);
        if (posVal >= 1 && posVal <= 50) {
          posTok = posVal;
          break;
        }
      }
    }
    if (posTok === null) continue;

    // Find points token and history by scanning number tokens in the surname column
    let pts = null;
    let history = null;

    for (let colIdx = 0; colIdx < surnameCol.length; colIdx++) {
      const t = surnameCol[colIdx].text;
      if (/^\d+(\.\d+)?$/.test(t)) {
        const candidatePts = parseFloat(t);
        if (candidatePts < 5 || candidatePts > 1000) continue;
        if (candidatePts === posTok) continue;

        // Test start indices after colIdx
        for (const startIdx of [colIdx + 1, colIdx + 3]) {
          if (startIdx >= surnameCol.length) continue;

          const candidateHistory = [];
          let k = startIdx;
          while (k < surnameCol.length && /^(\d+|-)$/.test(surnameCol[k].text)) {
            const val = surnameCol[k].text;
            candidateHistory.push(val === '-' ? 0 : parseInt(val, 10));
            k++;
          }

          const sum = candidateHistory.reduce((sumVal, c) => sumVal + c, 0);

          if (Math.abs(sum - candidatePts) < 0.1) {
            pts = candidatePts;
            history = candidateHistory;
            break;
          }
        }
        if (history !== null) break;
      }
    }

    if (history === null) continue;

    // Extract first name
    const firstName = firstNameCountryTok.replace(/\[[A-Z]{3}\]$/g, '').trim();

    // Format surname to Title Case
    const titleSurname = surnameTok.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const name = firstName + ' ' + titleSurname;

    if (!riders.find(r => r.name === name)) {
      riders.push({ name, pts, history });
    }
  }

  riders.sort((a, b) => b.pts - a.pts);
  return riders;
}

// ---- Parser SBK ----
function parseSBK(tokens) {
  const rowMap = new Map();
  for (const t of tokens) {
    const y = Math.round(t.y); let key = null;
    for (const k of rowMap.keys()) { if (Math.abs(y-k) <= 6) { key=k; break; } }
    if (key===null) { key=y; rowMap.set(key,[]); }
    rowMap.get(key).push(t);
  }
  const sortedRows = [...rowMap.entries()].sort((a,b)=>a[0]-b[0]).map(([,toks])=>toks.sort((a,b)=>a.x-b.x).map(t=>t.text.trim()));
  
  const riders = [];
  const seen = new Set();
  
  for (let i = 0; i < sortedRows.length; i++) {
    const toks = sortedRows[i];
    if (!toks[0] || !/^\d+$/.test(toks[0])) continue;
    const pos = parseInt(toks[0], 10);
    if (pos < 1 || pos > 100) continue;

    // Surname extraction (collect uppercase tokens)
    let j = 1;
    const surnameParts = [];
    while (
      j < toks.length &&
      /^[A-ZÁÀÉÈÍÌÓÒÚÙÑÜÇ\s\-']+$/.test(toks[j]) &&
      toks[j] === toks[j].toUpperCase() &&
      !/^\d+$/.test(toks[j])
    ) {
      surnameParts.push(toks[j]);
      j++;
    }
    if (surnameParts.length === 0) continue;
    const surname = surnameParts.join(' ');

    // Find the first token that is a number (this is the total points)
    let ptsIdx = -1;
    for (let k = j; k < toks.length; k++) {
      if (/^\d+$/.test(toks[k])) {
        ptsIdx = k;
        break;
      }
    }
    if (ptsIdx === -1) continue;
    const pts = parseInt(toks[ptsIdx], 10);

    // Extract first name from tokens between surname and points
    const firstNameParts = [];
    for (let k = j; k < ptsIdx; k++) {
      let t = toks[k].replace(/\([A-ZÁÀÉÈÍÌÓÒÚÙÑÜÇ]+\)/gi, '').trim();
      if (t) firstNameParts.push(t);
    }
    const firstName = firstNameParts.join(' ');

    const name = (firstName ? firstName + ' ' : '') + surname;
    if (!seen.has(name)) {
      seen.add(name);
      riders.push({ name, pts });
    }
  }

  riders.sort((a, b) => b.pts - a.pts);
  return riders;
}

function parseSBKConstructors(tokens) {
  const rowMap = new Map();
  for (const t of tokens) {
    const y = Math.round(t.y); let key = null;
    for (const k of rowMap.keys()) { if (Math.abs(y-k) <= 6) { key=k; break; } }
    if (key===null) { key=y; rowMap.set(key,[]); }
    rowMap.get(key).push(t);
  }
  const sortedRows = [...rowMap.entries()].sort((a,b)=>a[0]-b[0]).map(([,toks])=>toks.sort((a,b)=>a.x-b.x).map(t=>t.text.trim()));
  const constructors = [];
  for (const toks of sortedRows) {
    if (toks.length < 3) continue;
    if (!/^\d+$/.test(toks[0])) continue;
    const pos = parseInt(toks[0], 10);
    if (pos < 1 || pos > 20) continue;

    // Find the first token after index 0 that is a number (this is the points)
    let ptsIdx = -1;
    for (let k = 1; k < toks.length; k++) {
      if (/^\d+$/.test(toks[k])) {
        ptsIdx = k;
        break;
      }
    }
    if (ptsIdx === -1) continue;
    const pts = parseInt(toks[ptsIdx], 10);

    // Join tokens between index 0 and ptsIdx to get the manufacturer name
    const nameParts = [];
    for (let k = 1; k < ptsIdx; k++) {
      nameParts.push(toks[k]);
    }
    const name = nameParts.join(' ').replace(/\s+/g, ' ').trim();
    if (name.length < 2 || !/[a-zA-Z]/.test(name)) continue;

    constructors.push({ name, pts });
  }
  constructors.sort((a, b) => b.pts - a.pts);
  return constructors;
}

function parseSBKTeams(tokens) {
  const rowMap = new Map();
  for (const t of tokens) {
    const y = Math.round(t.y); let key = null;
    for (const k of rowMap.keys()) { if (Math.abs(y-k) <= 6) { key=k; break; } }
    if (key===null) { key=y; rowMap.set(key,[]); }
    rowMap.get(key).push(t);
  }
  const sortedRows = [...rowMap.entries()].sort((a,b)=>a[0]-b[0]).map(([,toks])=>toks.sort((a,b)=>a.x-b.x).map(t=>t.text.trim()));
  const teams = [];
  for (const toks of sortedRows) {
    if (toks.length < 3) continue;
    if (!/^\d+$/.test(toks[0])) continue;
    const pos = parseInt(toks[0], 10);
    if (pos < 1 || pos > 30) continue;

    // Find the first token after index 0 that is a number (this is the points)
    let ptsIdx = -1;
    for (let k = 1; k < toks.length; k++) {
      if (/^\d+$/.test(toks[k])) {
        ptsIdx = k;
        break;
      }
    }
    if (ptsIdx === -1) continue;
    const pts = parseInt(toks[ptsIdx], 10);

    // Join tokens between index 0 and ptsIdx to get the team name
    const nameParts = [];
    for (let k = 1; k < ptsIdx; k++) {
      nameParts.push(toks[k]);
    }
    const teamName = nameParts.join(' ').replace(/\s+/g, ' ').trim();
    if (teamName.length < 5 || !/[a-zA-Z]/.test(teamName)) continue;

    teams.push({ name: teamName, pts });
  }
  teams.sort((a, b) => b.pts - a.pts);
  return teams;
}

async function fetchStatsFromRepo() {

async function fetchOneStatsPDF(src) {
  const setTag = (cls, msg) => {
    const el = document.getElementById('gs-stats-' + src.catId);
    if (el) { el.className = 'gstatus ' + cls; el.textContent = msg; }
  };
  try {
    const res = await fetch('data/' + src.file + '?t=' + Date.now());
    if (!res.ok) throw new Error('File non trovato (HTTP ' + res.status + ')');
    const buf = await res.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    // Cerca la pagina che contiene sia "Constructor" che "Team" (di solito l'ultima)
    let targetPage = null;
    let targetTokens = null;
    for (let p = pdf.numPages; p >= 1; p--) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      const fullText = content.items.map(it => it.str).join(' ');
      if (fullText.includes('Constructor') && fullText.includes('Team')) {
        targetPage = page;
        targetTokens = content;
        break;
      }
    }
    if (!targetPage) { setTag('err', `⚠ ${src.label} — pagina Team/Constructor non trovata`); return; }

    const pageH = targetPage.getViewport({ scale: 1 }).height;
    const tokens = targetTokens.items
      .filter(it => it.str && it.str.trim())
      .map(it => ({ text: it.str.trim(), x: it.transform[4], y: pageH - it.transform[5] }));

    const { teams, constructors } = parseTeamsAndConstructors(tokens);

    if (teams.length === 0 && constructors.length === 0) {
      setTag('err', `⚠ ${src.label} — nessun dato Team/Constructor estratto`);
      return;
    }

    currentData[src.catId + '_teams'] = teams;
    currentData[src.catId + '_constructors'] = constructors;
    setTag('ok', `✓ ${src.label} — ${teams.length} team, ${constructors.length} costruttori`);
  } catch (err) {
    setTag('err', `⚠ ${src.label} — ${err.message}`);
  }
}

/**
 * Questa tabella MotoGP ha un layout a COLONNE (non a righe come le altre):
 * ogni costruttore/team è una colonna verticale, con nome e punteggio totale
 * allineati sulla stessa coordinata X ma a Y molto diverse.
 */
function parseTeamsAndConstructors(tokens) {
  const constructorHeaderTok = tokens.find(t => t.text === 'Constructor');
  const teamHeaderTok = tokens.find(t => t.text === 'Team');
  if (!constructorHeaderTok || !teamHeaderTok) return { teams: [], constructors: [] };

  // Riga di intestazione: prendi tutti i token vicini in Y a "Constructor" o "Team"
  const headerRowTokens = tokens
    .filter(t => Math.abs(t.y - constructorHeaderTok.y) <= 6 || Math.abs(t.y - teamHeaderTok.y) <= 6)
    .sort((a, b) => a.x - b.x);

  const constructorNames = [];
  const teamNames = [];
  let mode = null;
  for (const t of headerRowTokens) {
    if (t.text === 'Constructor') { mode = 'constructor'; continue; }
    if (t.text === 'Team') { mode = 'team'; continue; }
    if (mode === 'constructor') constructorNames.push({ x: t.x, name: t.text });
    else if (mode === 'team') teamNames.push({ x: t.x, name: t.text });
  }

  // Riga dei punti totali: intorno all'etichetta "Points" (sopra o leggermente sotto)
  const pointsLabelToks = tokens.filter(t => t.text === 'Points');
  const pointsRowYmin = pointsLabelToks.length ? Math.min(...pointsLabelToks.map(t => t.y)) : 375;
  const pointsRowYmax = pointsLabelToks.length ? Math.max(...pointsLabelToks.map(t => t.y)) : 385;

  const pointsCandidates = tokens.filter(t =>
    /^\d{1,4}(\.\d+)?$/.test(t.text) && t.y > pointsRowYmin - 20 && t.y < pointsRowYmax + 5
  );

  function matchPoints(nameList) {
    return nameList.map(n => {
      let best = null, bestDist = Infinity;
      for (const p of pointsCandidates) {
        const dist = Math.abs(p.x - n.x);
        if (dist < bestDist) { bestDist = dist; best = p; }
      }
      return best && bestDist < 2 ? { name: n.name, pts: parseFloat(best.text) } : null;
    }).filter(Boolean);
  }

  const constructors = matchPoints(constructorNames).sort((a, b) => b.pts - a.pts);
  const teams = matchPoints(teamNames).sort((a, b) => b.pts - a.pts);

  return { teams, constructors };
}

async function fetchAllAPI() {
  showGlobalStatus('load', '⏳ Recupero classifiche da API…');
  const statusDiv = document.getElementById('global-status');
  statusDiv.innerHTML = '';

  const labels = { motogp: 'MotoGP', moto2: 'Moto2', moto3: 'Moto3', mxgp: 'MXGP', mx2: 'MX2', f1: 'F1' };
  for (const key of ['motogp', 'moto2', 'moto3', 'mxgp', 'mx2', 'f1']) {
    const tag = document.createElement('div');
    tag.className = 'gstatus load'; tag.id = 'gs-' + key;
    tag.textContent = '⏳ ' + labels[key] + ' — recupero…';
    statusDiv.appendChild(tag);
  }

  // MotoGP / Moto2 / Moto3
  for (const [catId, catUuid] of Object.entries(PULSELIVE_CATEGORIES)) {
    try {
      const url = `https://api.motogp.pulselive.com/motogp/v1/results/standings?seasonUuid=${PULSELIVE_SEASON_2026}&categoryUuid=${catUuid}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const riders = (data.classification || [])
        .map(c => ({ name: c.rider.full_name, pts: parseFloat(c.points) }))
        .sort((a, b) => b.pts - a.pts);
      if (riders.length === 0) throw new Error('nessun pilota trovato');
      currentData[catId] = riders;
      const tag = document.getElementById('gs-' + catId);
      if (tag) { tag.className = 'gstatus ok'; tag.textContent = '✓ ' + labels[catId] + ' — ' + riders.length + ' piloti'; }
    } catch (err) {
      const tag = document.getElementById('gs-' + catId);
      if (tag) { tag.className = 'gstatus err'; tag.textContent = '⚠ ' + labels[catId] + ' — ' + err.message; }
    }
  }

  // MXGP via mxgpresults.com (tramite corsproxy per CORS)
  try {
    const mxgpUrl = 'https://corsproxy.io/?url=https://mxgpresults.com/mxgp/standings';
    const mxgpRes = await fetch(mxgpUrl, { signal: AbortSignal.timeout(10000) });
    if (!mxgpRes.ok) throw new Error('HTTP ' + mxgpRes.status);
    const html = await mxgpRes.text();
    // Parse righe tabella: pos | num | nome | bike | nat | pts
    const rowRe = /<tr[^>]*>\s*<td[^>]*>\d+\s*<\/td>\s*<td[^>]*>#\d+\s*<\/td>\s*<td[^>]*>([\s\S]*?)<\/td>[\s\S]*?<td[^>]*>(\d+)\s*<\/td>\s*<\/tr>/g;
    const mxgpRiders = [];
    let m;
    while ((m = rowRe.exec(html)) !== null) {
      const name = m[1].replace(/<[^>]+>/g, '').trim();
      const pts  = parseInt(m[2], 10);
      if (name && !isNaN(pts)) mxgpRiders.push({ name, pts });
    }
    if (mxgpRiders.length === 0) throw new Error('nessun pilota trovato');
    currentData['mxgp'] = mxgpRiders;
    const tagMx = document.getElementById('gs-mxgp');
    if (tagMx) { tagMx.className = 'gstatus ok'; tagMx.textContent = '✓ MXGP — ' + mxgpRiders.length + ' piloti'; }
  } catch (err) {
    const tagMx = document.getElementById('gs-mxgp');
    if (tagMx) { tagMx.className = 'gstatus err'; tagMx.textContent = '⚠ MXGP — ' + err.message; }
  }

  // MX2 via mxgpresults.com
  try {
    const mx2Url = 'https://corsproxy.io/?url=https://mxgpresults.com/mx2/standings';
    const mx2Res = await fetch(mx2Url, { signal: AbortSignal.timeout(10000) });
    if (!mx2Res.ok) throw new Error('HTTP ' + mx2Res.status);
    const html2 = await mx2Res.text();
    const rowRe2 = /<tr[^>]*>\s*<td[^>]*>\d+\s*<\/td>\s*<td[^>]*>#\d+\s*<\/td>\s*<td[^>]*>([\s\S]*?)<\/td>[\s\S]*?<td[^>]*>(\d+)\s*<\/td>\s*<\/tr>/g;
    const mx2Riders = [];
    let m2;
    while ((m2 = rowRe2.exec(html2)) !== null) {
      const name = m2[1].replace(/<[^>]+>/g, '').trim();
      const pts  = parseInt(m2[2], 10);
      if (name && !isNaN(pts)) mx2Riders.push({ name, pts });
    }
    if (mx2Riders.length === 0) throw new Error('no riders found');
    currentData['mx2'] = mx2Riders;
    const tagMx2 = document.getElementById('gs-mx2');
    if (tagMx2) { tagMx2.className = 'gstatus ok'; tagMx2.textContent = '✓ MX2 — ' + mx2Riders.length + ' riders'; }
  } catch (err) {
    const tagMx2 = document.getElementById('gs-mx2');
    if (tagMx2) { tagMx2.className = 'gstatus err'; tagMx2.textContent = '⚠ MX2 — ' + err.message; }
  }

  // F1 via Jolpica
  try {
    const endpoints = [
      'https://api.jolpi.ca/ergast/f1/2026/driverstandings.json',
      'https://corsproxy.io/?url=https://api.jolpi.ca/ergast/f1/2026/driverstandings.json',
    ];
    let data = null;
    for (const url of endpoints) {
      try { const res = await fetch(url, { signal: AbortSignal.timeout(8000) }); if (res.ok) { data = await res.json(); break; } } catch(e) { continue; }
    }
    if (!data) throw new Error('API non raggiungibile');
    const lists = data?.MRData?.StandingsTable?.StandingsLists;
    if (!lists || lists.length === 0) throw new Error('nessun dato 2026');
    const riders = lists[0].DriverStandings.map(d => ({ name: d.Driver.givenName + ' ' + d.Driver.familyName, pts: parseFloat(d.points) }));
    if (riders.length === 0) throw new Error('nessun pilota trovato');
    currentData['f1'] = riders;
    const tag = document.getElementById('gs-f1');
    if (tag) { tag.className = 'gstatus ok'; tag.textContent = '✓ F1 — ' + riders.length + ' piloti'; }
  } catch (err) {
    const tag = document.getElementById('gs-f1');
    if (tag) { tag.className = 'gstatus err'; tag.textContent = '⚠ F1 — ' + err.message; }
  }

  try {
    await saveToBin();
    renderAll();
  } catch (e) {
    showGlobalStatus('err', '⚠ Errore salvataggio su JSONBin: ' + e.message);
  }
}

// ---- Modal manuale ----
function openEditor() { document.getElementById('overlay').classList.add('open'); loadCategoryIntoEditor(); }
function closeEditor() { document.getElementById('overlay').classList.remove('open'); document.getElementById('error-msg').style.display='none'; }
document.getElementById('edit-category').addEventListener('change', loadCategoryIntoEditor);
function loadCategoryIntoEditor() {
  const catId=document.getElementById('edit-category').value;
  document.getElementById('edit-data').value=(currentData[catId]||[]).map(r=>r.name+', '+r.pts).join('\n');
  document.getElementById('error-msg').style.display='none';
}
async function saveData() {
  const catId=document.getElementById('edit-category').value;
  const raw=document.getElementById('edit-data').value.trim();
  const errEl=document.getElementById('error-msg');
  if (!raw) { currentData[catId]=[]; await saveToBin(); renderAll(); closeEditor(); return; }
  const lines=raw.split('\n').filter(l=>l.trim());
  const riders=[];
  for (const line of lines) {
    const parts=line.split(','); if(parts.length<2){errEl.style.display='block';return;}
    const name=parts.slice(0,-1).join(',').trim(); const pts=parts[parts.length-1].trim();
    if(!name||isNaN(Number(pts))){errEl.style.display='block';return;}
    riders.push({name,pts:Number(pts)});
  }
  errEl.style.display='none';
  currentData[catId]=riders;
  try { await saveToBin(); renderAll(); closeEditor(); }
  catch(e) { showGlobalStatus('err','⚠ Errore salvataggio: '+e.message); }
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeEditor();});
